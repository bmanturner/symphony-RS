# Linear GraphQL queries used by `LinearTracker`.
#
# Three operations, mirroring SPEC §11.1:
#
#   CandidateIssues   — `fetch_candidate_issues` (active dispatch list)
#   IssuesByStates    — `fetch_issues_by_states` (terminal cleanup)
#   IssueStatesByIds  — `fetch_issue_states_by_ids` (active reconcile)
#
# All three are typed by graphql_client against schema.graphql in this
# directory. The adapter (Phase 2 next task) issues these via reqwest and
# normalizes responses into `symphony_core::tracker::Issue`.
#
# Selection sets are deliberately narrow: only fields used by the
# normalizer. Extending a query means adding the field to schema.graphql
# first.

query CandidateIssues(
  $projectSlug: String!
  $stateNames: [String!]!
  $first: Int!
  $after: String
) {
  issues(
    filter: {
      project: { slugId: { eq: $projectSlug } }
      state: { name: { in: $stateNames } }
    }
    first: $first
    after: $after
  ) {
    pageInfo {
      hasNextPage
      endCursor
    }
    nodes {
      id
      identifier
      title
      description
      priority
      branchName
      url
      createdAt
      updatedAt
      state {
        id
        name
      }
      labels(first: 50) {
        nodes {
          name
        }
      }
      inverseRelations(first: 50) {
        nodes {
          type
          issue {
            id
            identifier
            state {
              name
            }
          }
        }
      }
    }
  }
}

query IssuesByStates(
  $projectSlug: String!
  $stateNames: [String!]!
  $first: Int!
  $after: String
) {
  issues(
    filter: {
      project: { slugId: { eq: $projectSlug } }
      state: { name: { in: $stateNames } }
    }
    first: $first
    after: $after
  ) {
    pageInfo {
      hasNextPage
      endCursor
    }
    nodes {
      id
      identifier
      title
      description
      priority
      branchName
      url
      createdAt
      updatedAt
      state {
        id
        name
      }
      labels(first: 50) {
        nodes {
          name
        }
      }
      inverseRelations(first: 50) {
        nodes {
          type
          issue {
            id
            identifier
            state {
              name
            }
          }
        }
      }
    }
  }
}

query IssueStatesByIds($ids: [ID!]!) {
  issues(filter: { id: { in: $ids } }, first: 250) {
    nodes {
      id
      identifier
      state {
        name
      }
    }
  }
}

# Mutations issued by `TrackerMutations` for `LinearTracker`.
#
# Each mutation maps 1:1 to a SPEC v2 §7.2 trait method. Selection sets
# stay narrow — only the fields the adapter normalises into the response
# struct. Linear's `success` flag is checked against `false` and surfaced
# as `TrackerError::Transport` so retries fall under the orchestrator's
# reconcile path.

mutation IssueCreate($input: IssueCreateInput!) {
  issueCreate(input: $input) {
    success
    issue {
      id
      identifier
      url
    }
  }
}

mutation IssueUpdate($id: String!, $input: IssueUpdateInput!) {
  issueUpdate(id: $id, input: $input) {
    success
    issue {
      id
      state {
        name
      }
    }
  }
}

mutation CommentCreate($input: CommentCreateInput!) {
  commentCreate(input: $input) {
    success
    comment {
      id
      url
    }
  }
}

mutation IssueRelationCreate($input: IssueRelationCreateInput!) {
  issueRelationCreate(input: $input) {
    success
    issueRelation {
      id
    }
  }
}

mutation AttachmentCreate($input: AttachmentCreateInput!) {
  attachmentCreate(input: $input) {
    success
    attachment {
      id
    }
  }
}
